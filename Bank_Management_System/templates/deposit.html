<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>deposit</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC"
      crossorigin="anonymous"
    />
  </head>
  <body>
    <br />
    <div class="container-md text-center">
      <h3>Deposit Amount</h3>
    </div>
    <br />
    {% if alart == "successfully" %}
        <div class="alert alert-success text-center" role="alert">
            Successfully Deposit!
            Current Balance {{message}}
        </div>
    {% elif alart == "unsuccessfully" %}
        <div class="alert alert-warning text-center" role="alert">
            Unsuccessfully Deposit !
        </div>
    {% endif %}
    <br />
    <div class="container-md">
        
      <form action="" method="POST">
        {% csrf_token %}
        <div class="mb-3">
          <label for="exampleInputname" class="form-label">Name</label>
          <input
            type="text"
            class="form-control"
            id="exampleInputname"
            name="name"
          />
        </div>
        <div class="mb-3">
          <label for="exampleInputEmail1" class="form-label"
            >Email address</label
          >
          <input
            type="email"
            class="form-control"
            id="exampleInputEmail1"
            aria-describedby="emailHelp"
            name="email"
          />
          <div id="emailHelp" class="form-text">
            We'll never share your email with anyone else.
          </div>
        </div>
        <div class="mb-3">
          <label for="exampleInputaccnumber" class="form-label">Acc Number</label>
          <input
            type="number"
            class="form-control"
            id="exampleInputaccnumber"
            name="accnumber"
          />
        </div>
        <div class="mb-3">
          <label for="exampleInputdepositamount" class="form-label">Deposit Amount</label>
          <input
            type="number"
            class="form-control"
            id="exampleInputdepositamount"
            name="depositamount"
          />
        </div>
        <button type="submit" class="btn btn-primary ">Deposit </button>
        <br>
        <br>
        <a href="{% url "home" %}" class=" btn btn-info ">Go to Home</a>
      </form>
    </div>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
